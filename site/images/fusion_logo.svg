<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="128" height="128">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Arrow lines from each atom toward center -->
    <line x1="50" y1="19" x2="50" y2="46" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
    <line x1="23.2" y1="65.5" x2="46.5" y2="52" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
    <line x1="76.8" y1="65.5" x2="53.5" y2="52" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>

    <!-- Open V arrowheads — 60° half-angle so adjacent arms are parallel -->
    <!-- Top arrow head (V opens upward) -->
    <polyline points="39.6,40 50,46 60.4,40" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bottom-left arrow head (V opens toward lower-left) -->
    <polyline points="36.1,46 46.5,52 46.5,64" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bottom-right arrow head (V opens toward lower-right) -->
    <polyline points="53.5,64 53.5,52 63.9,46" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Three atom circles -->
    <circle cx="50" cy="12" r="7" fill="none" stroke="#00D4FF" stroke-width="2"/>
    <circle cx="50" cy="12" r="2.5" fill="#00D4FF"/>

    <circle cx="17.1" cy="69" r="7" fill="none" stroke="#00D4FF" stroke-width="2"/>
    <circle cx="17.1" cy="69" r="2.5" fill="#00D4FF"/>

    <circle cx="82.9" cy="69" r="7" fill="none" stroke="#00D4FF" stroke-width="2"/>
    <circle cx="82.9" cy="69" r="2.5" fill="#00D4FF"/>
  </g>
</svg>
